spring.application.name=delivery-api

# Configuração do servidor
server.port=8080

# Configuração do H2 Database
spring.datasource.url=jdbc:h2:mem:deliverydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações de desenvolvimento
spring.devtools.restart.enabled=true

# Configurações específicas para JDK 21
spring.jpa.open-in-view=false
logging.level.org.springframework.web=DEBUG

# Configurações do Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=always
management.security.roles=ACTUATOR_ADMIN
management.info.env.enabled=true

# Informações da aplicação para /actuator/info
info.app.name=Delivery Tech API
info.app.description=API backend para sistema de delivery moderno
info.app.version=0.0.1-SNAPSHOT
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
info.developer.name=Victor Rabay
info.developer.id=TI 58A 02728
info.course=Arquitetura de Sistemas
info.build.artifact=@project.artifactId@
info.build.group=@project.groupId@
info.build.version=@project.version@
info.build.time=@maven.build.timestamp@

# Ativar Virtual Threads (Java 21)
server.tomcat.threads.virtual.enabled=false

# OpenAPI/Swagger Configuration
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=true